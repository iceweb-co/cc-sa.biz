{{ define "main" }}
<header class="block block-dark pb-0 course-hero-bg">
  <div class="container">
    <div class="row">
      <div class="col-lg-10 offset-lg-1 col-xl-8 offset-xl-2">
        <div class="box">
          <div class="box-head box-head-accent-2"></div>
          <div class="box-block box-block-padded box-bx box-bb box-rounded-0">
            <h2 class="block-title">{{ .Title }}</h2>
            {{ with .Params.subtitle }}
              <p class="block-subtitle h4">{{ . }}</p>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="block pt-0 course">
  <div class="container">
    <div class="row">
      <div class="col-lg-10 offset-lg-1 col-xl-8 offset-xl-2">
        <div class="box">
          <div class="box-block box-block-padded box-bx box-bb">
            <div class="text-justify">{{ .Content }}</div>
            {{ $courses := where .Site.RegularPages "Section" "course" }}
            {{ with $courses }}
            <h3>{{ T "current_courses" }}</h3>
            <ul class="list-group list-group-flush">
              {{ range . }}
              <li class="list-group-item d-flex justify-content-between
                align-items-center">
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
              </li>
              {{ end }}
            </ul>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
{{ end }}
