{{ define "main" }}
<header class="block block-dark text-center block-bb block-bt bg-gradient-1">
  <h2 class="block-title">{{ .Title }}</h2>
  <h5 class="block-subtitle"></h5>
</header>

<section class="block block-bt pb-1">
  <div class="container">
    <div class="row">
      {{ range .Params.team }}
      <div class="col-lg-3 col-md-6">
        <div class="team-member">
          <img src="/img/{{ .photo }}.jpg" alt="{{ .name }}" class="team-avatar" srcset="/img/{{ .photo }}.jpg 1x, /img/{{ .photo }}-2x.jpg 2x">
          <div class="team-member-text">
            <h3>{{ .name }}</h3>
            {{ .title }}
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
